#    ¬† ¬†‚ĖĎ‚Ėí‚Ėď‚Ėď ¬† ‚Ėď‚Ėď ¬†//____/


# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = ,preferred,auto,1


# ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĄ‚Ėą

$scrPath = $HOME/.local/share/bin # set scripts path


# ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = PATH,$PATH:$HOME/.local/bin
env = EDITOR,nvim
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = SLURP_ARGS,-b 33333344 -c 777777ff

# ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ

# See https://wiki.hyprland.org/Configuring/Keywords/

# Core Services
exec-once = $scrPath/resetxdgportal.sh # reset XDPH for screenshare
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = dbus-update-activation-environment --systemd --all # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = $scrPath/polkitkdeauth.sh # authentication dialogue for GUI apps

# UI Elements
exec-once = waybar # launch the system bar
exec-once = dunst # start notification demon
exec-once = nm-applet --indicator # systray app for Network/Wifi
exec-once = blueman-applet # systray app for Bluetooth
exec-once = udiskie --no-automount --smart-tray # manage removable media

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Wallpaper and Themeing
exec-once = awww-daemon
exec-once = $scrPath/swwwallpaper.sh # start wallpaper daemon (HyDE)
exec-once = $scrPath/batterynotify.sh # battery notification


# ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ

# See https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0.1
    force_no_accel = 0
    numlock_by_default = true
}

device {
    name = epic mouse V1
    sensitivity = -0.5
}


dwindle {
    # pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

xwayland {
    force_zero_scaling = true
}


# ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ

# Source separate config files
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/nvidia.conf

# Theme & Colors (HyDE related)
source = ~/.config/hypr/themes/common.conf # shared theme settings
# hyprlang noerror true
source = ~/.config/hypr/themes/theme.conf # theme specific settings
# hyprlang noerror false

# User preferences
# Note: as userprefs.conf is sourced at the end, settings configured in this file will override the defaults
source = ~/.config/hypr/userprefs.conf
